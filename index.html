<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/index.css">
  <title>Login Pro - ZervePos</title>
</head>
<body>

  <div class="fondo"></div>

  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <p>Bienvenido de nuevo</p>

    <form id="loginForm">
      <div class="input-box">
        <label for="nombreUsuario">Usuario</label>
        <input type="text" id="nombreUsuario" placeholder="Ingresa tu usuario" required>
      </div>

      <div class="input-box">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" required>
      </div>

      <button type="button" class="btn-login" onclick="iniciarSesion()">Entrar</button>
    </form>
  </div>

<script>
async function iniciarSesion() {
    // Tomamos los valores de los inputs
    const usuario = document.getElementById("nombreUsuario").value.trim();
    const contrasena = document.getElementById("contrasena").value.trim();

    if (!usuario || !contrasena) {
        alert("Por favor, ingresa tu usuario y contraseña.");
        return;
    }

    try {
        const respuesta = await fetch("/html/login.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                NombreUsuario: usuario,
                Contrasena: contrasena
            })
        });

        const data = await respuesta.json();

        if (data.status === "ok") {
            // Guardamos el nombre y rol para usarlo en inicio.html
            sessionStorage.setItem("usuarioLogueado", data.nombre);
            sessionStorage.setItem("rolUsuario", data.rol);
            
            // Redirigir a inicio.html
            window.location.href = "/html/inicio.html";
        } else {
            alert("Error: " + data.message);
        }
    } catch (error) {
        console.error("Error en la conexión:", error);
        alert("Hubo un problema al conectar con el servidor.");
    }
}
</script>

</body>
</html>
